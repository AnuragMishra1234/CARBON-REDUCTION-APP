services:
  - type: web
    name: carbon-ai-backend
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected automatically by Render — do not set manually
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your Vercel URL, e.g. https://carbon-ai.vercel.app
